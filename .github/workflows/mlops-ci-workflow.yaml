name: MLops CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  workflow:
  runs-on: ubuntu-latest
  steps:
    - name: Checkout code
      users: actions/checkout@v2
    
    - name: Setup Python
      users: actions/setup-python@v5
      with:
        python-version: '3.11.15'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
